<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时钟 & 待办</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ---- themes ---- */
  .theme-dark {
    --bg: rgba(26, 26, 46, 0.95);
    --card: rgba(22, 33, 62, 0.95);
    --accent: #e94560;
    --text: #eee;
    --text-dim: #999;
    --border: rgba(255,255,255,0.08);
    --done: #555;
    --input-bg: rgba(255,255,255,0.04);
    --check-border: rgba(255,255,255,0.15);
    --hover-bg: rgba(255,255,255,0.03);
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .theme-black {
    --bg: #000000;
    --card: #000000;
    --accent: #e94560;
    --text: #ffffff;
    --text-dim: #888888;
    --border: rgba(255,255,255,0.12);
    --done: #555555;
    --input-bg: rgba(255,255,255,0.06);
    --check-border: rgba(255,255,255,0.18);
    --hover-bg: rgba(255,255,255,0.04);
    --shadow: 0 8px 32px rgba(0,0,0,0.6);
  }

  .theme-white {
    --bg: #ffffff;
    --card: #ffffff;
    --accent: #e94560;
    --text: #1a1a1a;
    --text-dim: #999999;
    --border: rgba(0,0,0,0.1);
    --done: #bbbbbb;
    --input-bg: rgba(0,0,0,0.03);
    --check-border: rgba(0,0,0,0.18);
    --hover-bg: rgba(0,0,0,0.02);
    --shadow: 0 8px 32px rgba(0,0,0,0.15);
  }

  body {
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: transparent;
    color: var(--text);
    height: 100vh;
    padding: 12px;
    user-select: none;
    -webkit-app-region: no-drag;
  }

  .widget {
    background: var(--card);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 16px;
    padding: 24px 24px 20px;
    height: 100%;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }

  .close-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: none;
    background: var(--input-bg);
    color: var(--text-dim);
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, color 0.2s;
    z-index: 10;
  }

  .close-btn:hover {
    background: rgba(233,69,96,0.3);
    color: var(--accent);
  }

  .pin-btn {
    position: absolute;
    top: 10px;
    right: 38px;
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    z-index: 10;
    line-height: 1;
    overflow: hidden;
  }

  .pin-btn::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 1.5px;
    height: 130%;
    background: var(--accent);
    opacity: 0.55;
    border-radius: 1px;
    transform: translate(-50%, -50%) rotate(-45deg);
    transition: opacity 0.2s;
  }

  .pin-btn:hover {
    border-color: var(--text-dim);
    color: var(--text);
  }

  .pin-btn.pinned {
    color: var(--accent);
    background: rgba(233,69,96,0.15);
    border-color: transparent;
  }

  .pin-btn.pinned::after {
    opacity: 0;
  }

  /* ---- clock (drag handle) ---- */
  .clock-section {
    text-align: center;
    padding: 4px 0 18px;
    border-bottom: 1px solid var(--border);
    -webkit-app-region: drag;
    cursor: move;
  }

  .time {
    font-size: 48px;
    font-weight: 300;
    letter-spacing: 3px;
    font-variant-numeric: tabular-nums;
    font-family: 'Consolas', 'SF Mono', 'Cascadia Code', monospace;
  }

  .date {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* ---- todo ---- */
  .todo-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding-top: 14px;
    min-height: 0;
  }

  .todo-section h2 {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }

  .add-row {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }

  .add-row input {
    flex: 1;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--input-bg);
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .add-row input:focus {
    border-color: var(--accent);
  }

  .add-row button {
    padding: 8px 14px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .add-row button:active { transform: scale(0.95); }
  .add-row button:hover { opacity: 0.85; }

  .list {
    list-style: none;
    flex: 1;
    overflow-y: auto;
  }

  .list::-webkit-scrollbar { width: 3px; }
  .list::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 2px;
  }

  .list li {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    border-radius: 8px;
    transition: background 0.2s;
  }

  .list li:hover {
    background: var(--hover-bg);
  }

  .list li .check {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid var(--check-border);
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .list li .check:hover { border-color: var(--accent); }

  .list li.done .check {
    background: var(--accent);
    border-color: var(--accent);
  }

  .list li.done .check::after {
    content: '✓';
    font-size: 10px;
    color: #fff;
  }

  .list li .task-text {
    flex: 1;
    font-size: 13px;
    word-break: break-word;
  }

  .list li.done .task-text {
    text-decoration: line-through;
    color: var(--done);
  }

  .list li .del {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.2s, background 0.2s, color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .list li:hover .del { opacity: 1; }

  .list li .del:hover {
    background: rgba(233,69,96,0.2);
    color: var(--accent);
  }

  .empty-hint {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    padding: 16px 0;
  }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .count { font-size: 11px; color: var(--text-dim); }

  .clear-btn {
    font-size: 11px;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    transition: color 0.2s;
  }

  .clear-btn:hover { color: var(--accent); }
</style>
</head>
<body class="theme-dark">

<div class="widget">
  <button class="pin-btn pinned" id="pinBtn" title="取消置顶">📌</button>
  <button class="close-btn" id="closeBtn" title="关闭">✕</button>

  <div class="clock-section" id="dragHandle">
    <div class="time" id="time">00:00:00</div>
    <div class="date" id="date">----年-月-日 星期-</div>
  </div>

  <div class="todo-section">
    <h2>待办事项</h2>
    <div class="add-row">
      <input type="text" id="input" placeholder="添加新任务..." maxlength="200">
      <button id="addBtn">添加</button>
    </div>
    <ul class="list" id="list"></ul>
    <div class="footer">
      <span class="count" id="count">0 项待完成</span>
      <button class="clear-btn" id="clearDone">清除已完成</button>
    </div>
  </div>
</div>

<script>
const timeEl = document.getElementById('time');
const dateEl = document.getElementById('date');
const inputEl = document.getElementById('input');
const addBtn  = document.getElementById('addBtn');
const listEl  = document.getElementById('list');
const countEl = document.getElementById('count');
const clearBtn = document.getElementById('clearDone');
const closeBtn = document.getElementById('closeBtn');
const pinBtn   = document.getElementById('pinBtn');
const dragHandle = document.getElementById('dragHandle');

const STORAGE_KEY = 'clock_todo_items';

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function save(items) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}

let items = load();

function pad(n) { return String(n).padStart(2, '0'); }

function tick() {
  const now = new Date();
  timeEl.textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  const week = ['日', '一', '二', '三', '四', '五', '六'];
  dateEl.textContent =
    `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日 星期${week[now.getDay()]}`;
}

function render() {
  listEl.innerHTML = '';

  if (items.length === 0) {
    listEl.innerHTML = '<li class="empty-hint">暂无待办，享受空闲时光 ☕</li>';
  } else {
    items.forEach((item, i) => {
      const li = document.createElement('li');
      if (item.done) li.classList.add('done');

      const check = document.createElement('span');
      check.className = 'check';
      check.addEventListener('click', () => toggle(i));

      const text = document.createElement('span');
      text.className = 'task-text';
      text.textContent = item.text;

      const del = document.createElement('button');
      del.className = 'del';
      del.textContent = '×';
      del.addEventListener('click', (e) => { e.stopPropagation(); remove(i); });

      li.append(check, text, del);
      listEl.appendChild(li);
    });
  }

  const remaining = items.filter(i => !i.done).length;
  countEl.textContent = `${remaining} 项待完成`;
}

function add() {
  const text = inputEl.value.trim();
  if (!text) return;
  items.unshift({ text, done: false });
  save(items);
  inputEl.value = '';
  render();
}

function toggle(i) {
  items[i].done = !items[i].done;
  save(items);
  render();
}

function remove(i) {
  items.splice(i, 1);
  save(items);
  render();
}

function clearDone() {
  items = items.filter(i => !i.done);
  save(items);
  render();
}

addBtn.addEventListener('click', add);
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') add(); });
clearBtn.addEventListener('click', clearDone);

// --- Theme ---
const THEME_KEY = 'clock_todo_theme';
const themeMap = { dark: 'theme-dark', black: 'theme-black', white: 'theme-white' };

function applyTheme(name) {
  document.body.className = themeMap[name] || 'theme-dark';
  localStorage.setItem(THEME_KEY, name);
}

// load saved theme on start
const savedTheme = localStorage.getItem(THEME_KEY) || 'dark';
applyTheme(savedTheme);

// --- Electron interaction ---
if (window.widget) {
  closeBtn.addEventListener('click', () => window.widget.hideWindow());

  // sync loaded theme to main process for correct tray menu
  if (window.widget.setTheme) {
    window.widget.setTheme(savedTheme);
  }

  // listen for theme changes from tray menu
  if (window.widget.onThemeChanged) {
    window.widget.onThemeChanged((theme) => applyTheme(theme));
  }

  // pin / always-on-top toggle
  pinBtn.addEventListener('click', () => {
    if (window.widget.toggleAlwaysOnTop) {
      window.widget.toggleAlwaysOnTop();
    }
  });

  if (window.widget.onAlwaysOnTopChanged) {
    window.widget.onAlwaysOnTopChanged((pinned) => {
      if (pinned) {
        pinBtn.classList.add('pinned');
        pinBtn.title = '取消置顶';
      } else {
        pinBtn.classList.remove('pinned');
        pinBtn.title = '窗口置顶';
      }
    });
  }

  // fallback drag for systems where -webkit-app-region doesn't work
  let dragging = false, sx = 0, sy = 0;
  dragHandle.addEventListener('mousedown', e => {
    dragging = true; sx = e.screenX; sy = e.screenY;
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    window.widget.moveWindow(e.screenX - sx, e.screenY - sy);
    sx = e.screenX; sy = e.screenY;
  });
  window.addEventListener('mouseup', () => { dragging = false; });
} else {
  // running in browser — close hides the widget
  closeBtn.addEventListener('click', () => {
    document.querySelector('.widget').style.display = 'none';
  });
}

tick();
render();
setInterval(tick, 1000);
</script>
</body>
</html>
